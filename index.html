<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%97%82%EF%B8%8F%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idea Sorting Board</title>
    <script>
      // Bootstrap theme before React mounts so there's no flash of light.
      // Keep in sync with src/lib/theme.js (STORAGE_KEY + DEFAULT_THEME).
      (function () {
        try {
          var t = localStorage.getItem('isb:theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
